<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쇼앤프루프 공고 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f6f8;--card:#fff;--dark:#1a1d2e;--navy:#1e2a4a;--blue:#2563eb;--green:#16a34a;--green-bg:#f0fdf4;--amber:#d97706;--amber-bg:#fffbeb;--red:#dc2626;--red-bg:#fef2f2;--border:#e5e7eb;--text:#111827;--sub:#6b7280}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
.header{background:var(--dark);color:white;padding:32px 40px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-60px;right:-60px;width:300px;height:300px;background:radial-gradient(circle,rgba(37,99,235,.3) 0%,transparent 70%);pointer-events:none}
.header h1{font-size:22px;font-weight:900;margin-bottom:4px}
.header .sub{font-size:12px;color:rgba(255,255,255,.5)}
.header-right{position:absolute;top:32px;right:40px;display:flex;align-items:center;gap:10px}
.setting-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif}
.setting-btn:hover{background:rgba(255,255,255,.2)}
.last-update{font-size:11px;color:rgba(255,255,255,.4)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:20px 40px;background:var(--dark);border-top:1px solid rgba(255,255,255,.08)}
.stat{background:rgba(255,255,255,.06);border-radius:8px;padding:12px 16px;text-align:center}
.stat .val{font-size:22px;font-weight:700;color:white}
.stat .lbl{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.tabs{background:white;border-bottom:2px solid var(--border);padding:0 40px;display:flex;overflow-x:auto;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.tab{padding:14px 18px;font-size:13px;font-weight:500;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s;user-select:none}
.tab:hover{color:var(--blue)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.content{padding:28px 40px;max-width:1200px;margin:0 auto}
.page{display:none}
.page.active{display:block}
.loading{text-align:center;padding:60px;color:var(--sub);font-size:14px}
.spin{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.bid-card{background:white;border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;position:relative;transition:box-shadow .15s}
.bid-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.bid-accent{position:absolute;left:0;top:0;bottom:0;width:4px}
.bid-head{display:flex;align-items:center;gap:12px;padding:14px 18px 14px 22px}
.bid-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap;flex-shrink:0}
.badge-win{background:var(--green-bg);color:#14532d;border:1px solid #86efac}
.badge-lose{background:var(--red-bg);color:#7f1d1d;border:1px solid #fca5a5}
.badge-review{background:#eff6ff;color:#1e40af;border:1px solid #93c5fd}
.bid-info{flex:1;min-width:0}
.bid-name{font-size:13px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bid-meta{font-size:11px;color:var(--sub)}
.bid-right{text-align:right;flex-shrink:0}
.bid-prob{font-size:16px;font-weight:700}
.bid-date{font-size:11px;color:var(--sub);margin-top:2px}
.bid-detail{padding:12px 18px 14px 22px;border-top:1px solid var(--border);background:#fafafa;font-size:12px;line-height:1.7;color:var(--text)}
.empty{text-align:center;padding:60px;color:var(--sub)}
.empty-icon{font-size:40px;margin-bottom:12px}
/* 설정 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:white;border-radius:12px;padding:28px;width:480px;max-width:90vw}
.modal h2{font-size:16px;font-weight:700;margin-bottom:6px}
.modal .desc{font-size:12px;color:var(--sub);margin-bottom:20px;line-height:1.6}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px;display:block}
.form-input{width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text)}
.form-input:focus{outline:none;border-color:var(--blue)}
.form-hint{font-size:11px;color:var(--sub);margin-top:4px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.btn-cancel{padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:white;color:var(--sub);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px}
.btn-save{padding:8px 16px;border:none;border-radius:6px;background:var(--blue);color:white;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700}
.btn-save:hover{background:#1d4ed8}
.refresh-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif}
.refresh-btn:hover{background:rgba(255,255,255,.2)}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.content{padding:16px}.header{padding:20px 16px}.header-right{position:static;margin-top:12px}.tabs{padding:0 16px}}
</style>
</head>
<body>

<div class="header">
  <h1>쇼앤프루프 공고 대시보드</h1>
  <div class="sub" id="lastUpdate">마지막 업데이트: —</div>
  <div class="header-right">
    <button class="refresh-btn" onclick="loadData()">🔄 새로고침</button>
    <button class="setting-btn" onclick="openSetting()">⚙️ API 설정</button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="val" id="statTotal">—</div><div class="lbl">전체 공고</div></div>
  <div class="stat"><div class="val" id="statWin" style="color:#4ade80">—</div><div class="lbl">도전 확정</div></div>
  <div class="stat"><div class="val" id="statLose" style="color:#f87171">—</div><div class="lbl">포기 확정</div></div>
  <div class="stat"><div class="val" id="statReview" style="color:#93c5fd">—</div><div class="lbl">검토 중</div></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('all',this)">전체</div>
  <div class="tab" onclick="showTab('win',this)">✅ 도전</div>
  <div class="tab" onclick="showTab('lose',this)">❌ 포기</div>
  <div class="tab" onclick="showTab('review',this)">🔍 검토중</div>
</div>

<div class="content">
  <div id="all" class="page active">
    <div class="loading" id="loading-all">
      <div class="spin"></div><br>Airtable에서 데이터 불러오는 중...
    </div>
    <div id="list-all"></div>
  </div>
  <div id="win" class="page">
    <div id="list-win"></div>
  </div>
  <div id="lose" class="page">
    <div id="list-lose"></div>
  </div>
  <div id="review" class="page">
    <div id="list-review"></div>
  </div>
</div>

<!-- 설정 모달 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>⚙️ Airtable API 설정</h2>
    <div class="desc">아래 정보를 입력하면 Airtable에서 공고 데이터를 자동으로 불러와요.<br>입력한 정보는 브라우저에만 저장되고 외부로 전송되지 않아요.</div>
    <div class="form-group">
      <label class="form-label">Airtable Personal Access Token</label>
      <input type="password" class="form-input" id="inputToken" placeholder="pat으로 시작하는 토큰 입력">
      <div class="form-hint">Developer Hub → Personal access tokens에서 발급</div>
    </div>
    <div class="form-group">
      <label class="form-label">Base ID</label>
      <input type="text" class="form-input" id="inputBaseId" placeholder="app으로 시작하는 Base ID 입력">
      <div class="form-hint">Airtable URL에서 확인: airtable.com/앱ID/...</div>
    </div>
    <div class="form-group">
      <label class="form-label">테이블 이름</label>
      <input type="text" class="form-input" id="inputTable" placeholder="공고목록" value="공고목록">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeSetting()">취소</button>
      <button class="btn-save" onclick="saveSetting()">저장 후 불러오기</button>
    </div>
  </div>
</div>

<script>
var allRecords = [];

function getConfig() {
  return {
    token: localStorage.getItem('at_token') || '',
    baseId: localStorage.getItem('at_base') || '',
    table: localStorage.getItem('at_table') || '공고목록'
  };
}

function openSetting() {
  var cfg = getConfig();
  document.getElementById('inputToken').value = cfg.token;
  document.getElementById('inputBaseId').value = cfg.baseId;
  document.getElementById('inputTable').value = cfg.table || '공고목록';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeSetting() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function saveSetting() {
  var token = document.getElementById('inputToken').value.trim();
  var baseId = document.getElementById('inputBaseId').value.trim();
  var table = document.getElementById('inputTable').value.trim() || '공고목록';
  if (!token || !baseId) {
    alert('토큰과 Base ID를 모두 입력해주세요.');
    return;
  }
  localStorage.setItem('at_token', token);
  localStorage.setItem('at_base', baseId);
  localStorage.setItem('at_table', table);
  closeSetting();
  loadData();
}

function showTab(id, el) {
  document.querySelectorAll('.page').forEach(function(p){ p.style.display='none'; p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById(id).style.display = 'block';
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

function accentColor(judgment) {
  if (!judgment) return '#9ca3af';
  if (judgment.includes('도전')) return '#16a34a';
  if (judgment.includes('포기')) return '#dc2626';
  return '#2563eb';
}

function badgeClass(judgment) {
  if (!judgment) return 'badge-review';
  if (judgment.includes('도전')) return 'badge-win';
  if (judgment.includes('포기')) return 'badge-lose';
  return 'badge-review';
}

function renderCard(r) {
  var f = r.fields || {};
  var judgment = f['판단'] || '검토중🔍';
  var color = accentColor(judgment);
  var badge = badgeClass(judgment);
  var prob = f['수주확률'] || '—';
  var name = f['공고명'] || '공고명 없음';
  var org = f['발주기관'] || '—';
  var budget = f['예산'] || '—';
  var deadline = f['마감일'] || '—';
  var method = f['계약방법'] || '—';
  var detail = f['분석내용'] || f['포기사유'] || '';
  var collected = f['수집일'] || '';

  var detailHtml = detail ? '<div class="bid-detail">'+detail+'</div>' : '';

  return '<div class="bid-card">' +
    '<div class="bid-accent" style="background:'+color+'"></div>' +
    '<div class="bid-head">' +
      '<span class="bid-badge '+badge+'">'+judgment+'</span>' +
      '<div class="bid-info">' +
        '<div class="bid-name">'+name+'</div>' +
        '<div class="bid-meta">'+org+' · '+budget+' · 마감 '+deadline+' · '+method+'</div>' +
      '</div>' +
      '<div class="bid-right">' +
        '<div class="bid-prob" style="color:'+color+'">'+prob+'</div>' +
        '<div class="bid-date">수집 '+collected+'</div>' +
      '</div>' +
    '</div>' +
    detailHtml +
  '</div>';
}

function renderList(records, containerId) {
  var el = document.getElementById(containerId);
  if (!records || records.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>해당 공고가 없어요</div>';
    return;
  }
  el.innerHTML = records.map(renderCard).join('');
}

function updateStats(records) {
  var win = records.filter(function(r){ return (r.fields['판단']||'').includes('도전'); }).length;
  var lose = records.filter(function(r){ return (r.fields['판단']||'').includes('포기'); }).length;
  var review = records.filter(function(r){ return (r.fields['판단']||'').includes('검토'); }).length;
  document.getElementById('statTotal').textContent = records.length;
  document.getElementById('statWin').textContent = win;
  document.getElementById('statLose').textContent = lose;
  document.getElementById('statReview').textContent = review;
}

function loadData() {
  var cfg = getConfig();
  if (!cfg.token || !cfg.baseId) {
    document.getElementById('list-all').innerHTML = '<div class="empty"><div class="empty-icon">⚙️</div>우측 상단 <strong>API 설정</strong> 버튼을 눌러<br>Airtable 토큰과 Base ID를 입력해주세요</div>';
    document.getElementById('loading-all').style.display = 'none';
    return;
  }

  document.getElementById('loading-all').style.display = 'block';
  document.getElementById('list-all').innerHTML = '';

  var table = encodeURIComponent(cfg.table);
  var url = 'https://api.airtable.com/v0/' + cfg.baseId + '/' + table + '?sort[0][field]=수집일&sort[0][direction]=desc&maxRecords=200';

  fetch(url, {
    headers: { 'Authorization': 'Bearer ' + cfg.token }
  })
  .then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  })
  .then(function(data) {
    document.getElementById('loading-all').style.display = 'none';
    allRecords = data.records || [];

    var now = new Date();
    document.getElementById('lastUpdate').textContent =
      '마지막 업데이트: ' + now.getFullYear() + '.' + (now.getMonth()+1) + '.' + now.getDate() + ' ' +
      now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');

    updateStats(allRecords);
    renderList(allRecords, 'list-all');

    var wins = allRecords.filter(function(r){ return (r.fields['판단']||'').includes('도전'); });
    var loses = allRecords.filter(function(r){ return (r.fields['판단']||'').includes('포기'); });
    var reviews = allRecords.filter(function(r){ return (r.fields['판단']||'').includes('검토'); });

    renderList(wins, 'list-win');
    renderList(loses, 'list-lose');
    renderList(reviews, 'list-review');
  })
  .catch(function(err) {
    document.getElementById('loading-all').style.display = 'none';
    document.getElementById('list-all').innerHTML =
      '<div class="empty"><div class="empty-icon">❌</div>데이터 불러오기 실패<br><small style="color:#9ca3af">'+err.message+'</small><br><br><button class="setting-btn" style="background:var(--blue);color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer" onclick="openSetting()">API 설정 확인</button></div>';
  });
}

// 페이지 로드 시 자동 실행
window.onload = function() {
  var cfg = getConfig();
  if (cfg.token && cfg.baseId) {
    loadData();
  } else {
    document.getElementById('loading-all').style.display = 'none';
    document.getElementById('list-all').innerHTML =
      '<div class="empty"><div class="empty-icon">⚙️</div>우측 상단 <strong>API 설정</strong> 버튼을 눌러<br>Airtable 토큰과 Base ID를 입력해주세요</div>';
  }
};
</script>
</body>
</html>
